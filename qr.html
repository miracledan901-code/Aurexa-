<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Website QR Code</title>
  <style>
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      background: #f4f4f4;
      font-family: Arial, sans-serif;
      flex-direction: column;
    }
    img {
      border: 5px solid #000;
      padding: 10px;
      border-radius: 10px;
      background: #fff;
    }
    h2 {
      margin-top: 20px;
    }
  </style>
</head>
<body>
  <img src="https://chart.googleapis.com/chart?cht=qr&chs=200x200&chl=https://yourwebsite.com" alt="QR Code">
  <h2>Scan to visit my website</h2>
</body>
</html>
